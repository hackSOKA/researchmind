site_name: ResearchMind
site_description: Agentic RAG Platform — Chat with your research documents and analytics data
site_author: Hack Soka
site_url: https://TON_USERNAME.github.io/researchmind

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Installation: installation.md
  - Usage: usage.md
  - API Reference: api.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - admonition
  - toc:
      permalink: true